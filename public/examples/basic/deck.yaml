bases:
  # always:true は全スライドに自動適用される (旧 overlay 相当)。宣言順=z下から。
  - id: footer
    always: true
    file: ./overlays/footer.yaml
  # 以下は use: で選択する base。
  - id: standard
    file: ./theme.yaml
  - id: section
    file: ./theme-section.yaml
  - id: light
    file: ./theme-light.yaml

slides:
  - id: intro
    use: standard
    vars:
      title: "YAML スライドの世界"
      subtitle: "宣言的記述で SVG と PDF を同時に"
    elements:
      - type: image
        src: ./img/cover.png
        position: { right: 6%, bottom: 9%, width: 18% }

  - id: agenda
    use: standard
    vars:
      title: "目次"
    elements:
      - type: ol
        position: { left: 12%, right: 12%, top: 40%, bottom: 14% }
        gap: 3%
        size: 56
        color: ${accent}
        items:
          - { type: text, text: "背景と動機", size: 56 }
          - { type: text, text: "三層 IR アーキテクチャ", size: 56 }
          - { type: text, text: "レンダラの一貫性", size: 56 }
          - { type: text, text: "これからの拡張", size: 56 }

  - id: section-1
    use: section
    vars:
      title: "背景と動機"

  - id: closing
    use: light
    vars:
      title: "ありがとうございました"
      subtitle: "light base プリセットの例"

  - id: feature
    use: standard
    vars:
      title: "配置システム"
      subtitle: "CSS absolute と同じセマンティクス"
    elements:
      - type: group
        position: { left: 10%, right: 10%, top: 42%, height: 40% }
        layout: row
        gap: 3%
        align: stretch
        children:
          - type: rect
            flex: 1
            fill: ${panel}
            stroke: ${accent}
            strokeWidth: 2
            rx: 16
          - type: rect
            flex: 2
            fill: ${panel}
            stroke: ${muted}
            strokeWidth: 2
            rx: 16
          - type: rect
            flex: 1
            fill: ${accent}
            rx: 16
