bases:
  # always:true applies automatically to every slide (formerly "overlay"). Declaration order = z from bottom up.
  - id: footer
    always: true
    file: ./overlays/footer.yaml
  # The bases below are selected via use:.
  - id: standard
    file: ./theme.yaml
  - id: section
    file: ./theme-section.yaml
  - id: light
    file: ./theme-light.yaml

slides:
  - id: intro
    use: standard
    vars:
      title: "The World of YAML Slides"
      subtitle: "SVG and PDF together, declaratively"
    elements:
      - type: image
        src: ./img/cover.png
        position: { right: 6%, bottom: 9%, width: 18% }

  - id: agenda
    use: standard
    vars:
      title: "Contents"
    elements:
      - type: ol # explicit: a bare "items" infers ul, so ordered lists need type: ol
        position: { left: 12%, right: 12%, top: 40%, bottom: 14% }
        gap: 3%
        size: 56
        color: ${accent}
        # type can be omitted on elements; it is inferred from a characteristic
        # field (text->text, children->group, items->ul, src->image, d->path ...).
        # The list size also becomes the default text size for items.
        items:
          # An item can be a group (layout: column) so a heading and a nested ul
          # stack vertically; the group's height is measured automatically.
          - layout: column # group (inferred from children)
            gap: 1.5%
            children:
              - { text: "Background and Motivation" } # text
              - size: 36 # ul (inferred from items)
                gap: 1%
                color: ${muted}
                items:
                  - { text: "One IR for SVG and PDF", color: "${fg}" }
                  - { text: "Declarative, reusable bases", color: "${fg}" }
          - { text: "Three-Layer IR Architecture" }
          - { text: "Renderer Consistency" }
          - { text: "Future Extensions" }

  - id: section-1
    use: section
    vars:
      title: "Background and Motivation"
    elements:
      - type: text
        position: { left: 14%, top: 60%, width: 74% }
        size: 34
        color: ${muted}
        text: 'You can write **Markdown**, `inline code`, ~~strikethrough~~, [links](https://example.com), and math like $E = mc^2$ right in the text.'

  - id: multiline
    use: standard
    vars:
      title: "Multi-line Text"
    elements:
      - type: text
        position: { left: 12%, right: 12%, top: 42% }
        size: 44
        color: ${fg}
        # |- is a YAML block scalar: it keeps the line breaks and strips the
        # final trailing newline (use plain | to keep it). Inline markdown and
        # math still work on each line.
        text: |-
          Line breaks are written with a YAML block scalar.
          Each line is laid out on its own, and **markdown**,
          `inline code`, and math like $E = mc^2$ still work.

  - id: code
    use: standard
    vars:
      title: "Inline Code"
    elements:
      - type: text
        position: { left: 12%, right: 12%, top: 42% }
        size: 38
        color: ${fg}
        # SourceCodePro is the only monospace font registered (see theme.yaml).
        # prepare detects it via the post table's isFixedPitch flag and adopts it
        # as the default for inline `code`, no defaults.mono.family needed.
        text: |-
          Inline `code` renders in **Source Code Pro**, picked up automatically
          because it is the only monospace font registered.
          Examples: `const x = 42`, `git push origin main`, `<svg viewBox=…>`.

  - id: directives
    use: standard
    vars:
      title: "Inline Directives"
    elements:
      - type: text
        position: { left: 12%, right: 12%, top: 42% }
        size: 38
        color: ${fg}
        # ?[content](k=v, ...) is a generic inline directive. The only attribute
        # implemented so far is `color`; markdown still works inside the content
        # and directives nest (inner overrides outer). Variables (${...}) expand
        # before parsing so theme colors can be reused.
        text: |-
          Default body color, ?[accent highlight](color=${accent}),
          ?[**warning bold**](color=#f7768e), and
          ?[outer red ?[inner blue](color=${accent}) back to red](color=#f7768e).

  - id: shapes
    use: standard
    vars:
      title: "Shape Primitives"
    elements:
      # type: figure with shape: rect | line | circle | arrow. Fields not used
      # by the chosen shape are simply ignored.
      - type: group
        position: { left: 10%, right: 10%, top: 42%, height: 40% }
        layout: row
        gap: 5%
        align: stretch
        children:
          - type: figure
            shape: rect
            flex: 1
            fill: ${panel}
            stroke: ${accent}
            strokeWidth: 4
            rx: 24
          - type: figure
            shape: circle
            flex: 1
            fill: ${panel}
            stroke: ${accent}
            strokeWidth: 4
          - type: figure
            shape: line
            flex: 1
            from: { x: 10%, y: 90% }
            to: { x: 90%, y: 10% }
            stroke: ${accent}
            strokeWidth: 6
          - type: figure
            shape: arrow
            flex: 1
            from: { x: 10%, y: 50% }
            to: { x: 90%, y: 50% }
            stroke: ${accent}
            strokeWidth: 6
            arrowSize: 32

  - id: closing
    use: light
    vars:
      title: "Thank You"
      subtitle: "An example of the light base preset"

  - id: feature
    use: standard
    vars:
      title: "Positioning System"
      subtitle: "Same semantics as CSS absolute"
    elements:
      - type: group
        position: { left: 10%, right: 10%, top: 42%, height: 40% }
        layout: row
        gap: 3%
        align: stretch
        children:
          - type: figure
            shape: rect
            flex: 1
            fill: ${panel}
            stroke: ${accent}
            strokeWidth: 2
            rx: 16
          - type: figure
            shape: rect
            flex: 2
            fill: ${panel}
            stroke: ${muted}
            strokeWidth: 2
            rx: 16
          - type: figure
            shape: rect
            flex: 1
            fill: ${accent}
            rx: 16
