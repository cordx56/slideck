bases:
  # always:true applies automatically to every slide (formerly "overlay"). Declaration order = z from bottom up.
  - id: footer
    always: true
    file: ./overlays/footer.yaml
  # The bases below are selected via use:.
  - id: standard
    file: ./theme.yaml
  - id: section
    file: ./theme-section.yaml
  - id: light
    file: ./theme-light.yaml

slides:
  - id: intro
    use: standard
    vars:
      title: "The World of YAML Slides"
      subtitle: "SVG and PDF together, declaratively"
    elements:
      - type: image
        src: ./img/cover.png
        position: { right: 6%, bottom: 9%, width: 18% }

  - id: agenda
    use: standard
    vars:
      title: "Contents"
    elements:
      - type: ol
        position: { left: 12%, right: 12%, top: 40%, bottom: 14% }
        gap: 3%
        size: 56
        color: ${accent}
        items:
          # An ol item can be a group (layout: column) so a heading and a nested
          # ul stack vertically. The group's height is measured automatically.
          - type: group
            layout: column
            gap: 1.5%
            children:
              - { type: text, text: "Background and Motivation", size: 56 }
              - type: ul
                size: 36
                gap: 1%
                color: ${muted}
                items:
                  - { type: text, text: "One IR for SVG and PDF", size: 36, color: "${fg}" }
                  - { type: text, text: "Declarative, reusable bases", size: 36, color: "${fg}" }
          - { type: text, text: "Three-Layer IR Architecture", size: 56 }
          - { type: text, text: "Renderer Consistency", size: 56 }
          - { type: text, text: "Future Extensions", size: 56 }

  - id: section-1
    use: section
    vars:
      title: "Background and Motivation"
    elements:
      - type: text
        position: { left: 14%, top: 60%, width: 74% }
        size: 34
        color: ${muted}
        text: 'You can write **Markdown**, `inline code`, ~~strikethrough~~, [links](https://example.com), and math like $E = mc^2$ right in the text.'

  - id: closing
    use: light
    vars:
      title: "Thank You"
      subtitle: "An example of the light base preset"

  - id: feature
    use: standard
    vars:
      title: "Positioning System"
      subtitle: "Same semantics as CSS absolute"
    elements:
      - type: group
        position: { left: 10%, right: 10%, top: 42%, height: 40% }
        layout: row
        gap: 3%
        align: stretch
        children:
          - type: rect
            flex: 1
            fill: ${panel}
            stroke: ${accent}
            strokeWidth: 2
            rx: 16
          - type: rect
            flex: 2
            fill: ${panel}
            stroke: ${muted}
            strokeWidth: 2
            rx: 16
          - type: rect
            flex: 1
            fill: ${accent}
            rx: 16
