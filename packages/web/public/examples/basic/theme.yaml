name: standard

fonts:
  # Each font entry is one face, registered under its own family. Role
  # assignment (bold/italic/mono) lives in defaults.text / defaults.mono.
  heading:    { path: ./fonts/NotoSerif-Regular.ttf,    family: "NotoSerif" }
  body:       { path: ./fonts/NotoSans-Regular.ttf,     family: "NotoSans" }
  body-bold:  { path: ./fonts/NotoSans-Bold.ttf,        family: "NotoSansBold" }
  code:       { path: ./fonts/SourceCodePro-Regular.ttf, family: "SourceCodePro" }

# colors are injected as variables (referenced via ${bg} etc.). Can be overridden by a slide's vars.
colors:
  bg: "#0e0e10"
  fg: "#f5f5f5"
  accent: "#7aa2f7"
  muted: "#9c9a92"
  panel: "#1b1b22"

slide:
  width: 1920
  height: 1080

background: ${bg}

defaults:
  # Role slots: text is the body face; bold/italic point at separately-declared
  # faces. mono's family is auto-detected (the only fixed-pitch font wins) -- you
  # can also set it explicitly to a fonts: key.
  text: { family: body, size: 40, color: "${fg}", lineHeight: 1.35, bold: body-bold }
  link: { color: "${accent}", underline: true }
  mono: { color: "${muted}" }

schema:
  vars:
    title: { type: string, required: true }
    subtitle: { type: string, default: "" }

layout:
  - type: text
    position: { left: center, top: 12%, width: 86% }
    font: heading
    size: 110
    color: ${fg}
    align: center
    text: ${title}

  - type: text
    position: { left: center, top: 32%, width: 80% }
    font: body
    size: 44
    color: ${accent}
    align: center
    text: ${subtitle}
