# footer base — declared with always:true in deck.yaml. Appears on every slide.
# layout is a standard field of base files. ${slideNumber}/${slideCount} are
# system variables (injected automatically by normalize).
layout:
  - type: line
    from: { x: 4%, y: 94% }
    to: { x: 96%, y: 94% }
    stroke: ${muted}
    strokeWidth: 2

  - type: text
    position: { left: 4%, top: 95%, width: 50% }
    font: body
    size: 24
    color: ${muted}
    text: "slideck — YAML Slides"

  - type: text
    position: { right: 4%, top: 95%, width: 20% }
    font: body
    size: 24
    color: ${muted}
    align: right
    text: "${slideNumber} / ${slideCount}"
