# A section-divider theme that extends standard with only the layout replaced.
name: section
extends: ./theme.yaml

background: ${panel}

layout:
  - type: figure
    shape: rect
    position: { left: 8%, top: center, width: 6, height: 56% }
    fill: ${accent}
    rx: 3

  - type: text
    position: { left: 14%, top: center, width: 78% }
    font: heading
    size: 100
    color: ${fg}
    align: left
    text: ${title}
