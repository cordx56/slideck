name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Run JS actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the web app. Output goes to packages/web/dist (fully static).
      # Cloudflare Pages serves at the root, so the default VITE_BASE=/ is correct.
      # VITE_SITE_URL is the canonical origin baked into the OGP/Twitter tags.
      - name: Build web
        run: pnpm --filter @slideck/web build
        env:
          VITE_SITE_URL: https://slideck.56.ax

      # Deploy via npx (npm), not pnpm/wrangler-action: npm runs wrangler's native
      # build scripts (sharp, workerd) without pnpm 11's build-approval gate, so
      # those deploy-only packages stay out of pnpm-workspace.yaml.
      - name: Deploy
        run: npx --yes wrangler@4 pages deploy packages/web/dist --project-name=slideck
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
